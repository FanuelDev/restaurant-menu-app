# /etc/nginx/sites-available/backend.saemenus.com.conf
# API AdonisJS — backend.saemenus.com
#
# Copier vers : /etc/nginx/sites-available/backend.saemenus.com.conf
# Activer avec : ln -s /etc/nginx/sites-available/backend.saemenus.com.conf /etc/nginx/sites-enabled/
# DNS : backend.saemenus.com → A 72.62.21.77

server {
    listen 80;
    listen [::]:80;
    server_name backend.saemenus.com;

    # Compression
    gzip on;
    gzip_proxied any;
    gzip_types application/json;

    # Logs
    access_log /var/log/nginx/backend_saemenus_access.log;
    error_log  /var/log/nginx/backend_saemenus_error.log;

    # Taille max pour les uploads d'images
    client_max_body_size 15m;

    location / {
        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
