# /etc/nginx/sites-available/saemenus.com.conf
# Frontend Angular — saemenus.com + sous-domaines tenants (*.saemenus.com)
#
# Copier vers : /etc/nginx/sites-available/saemenus.com.conf
# Activer avec : ln -s /etc/nginx/sites-available/saemenus.com.conf /etc/nginx/sites-enabled/
# DNS : saemenus.com et *.saemenus.com → A 72.62.21.77

server {
    listen 80;
    listen [::]:80;
    server_name saemenus.com *.saemenus.com;

    # Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Logs
    access_log /var/log/nginx/saemenus_access.log;
    error_log  /var/log/nginx/saemenus_error.log;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }
}
