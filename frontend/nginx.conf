# frontend/nginx.conf
# Configuration Nginx pour Angular SPA + proxy vers l'API backend

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Headers de sécurité ────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options  "nosniff"                             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Compression gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Cache assets Angular (noms hashés, immutables) ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy API vers le backend AdonisJS ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }


    # ── Proxy webhooks CinetPay (route sans préfixe /api/) ─────────────────────
    location /webhooks/ {
        proxy_pass         http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Proxy uploads locaux (si DRIVE_DISK=local) ─────────────────────────────
    location /uploads/ {
        proxy_pass http://backend:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Proxy images MinIO (si DRIVE_DISK=s3, S3_CDN_URL=https://domain.com/media)
    # Les URLs d'images retournées par l'API auront la forme /media/<key>
    location /media/ {
        proxy_pass         http://minio:9000/restaurant-menu/;
        proxy_http_version 1.1;
        proxy_set_header   Host              minio:9000;
        proxy_hide_header  x-amz-id-2;
        proxy_hide_header  x-amz-request-id;
        proxy_hide_header  x-minio-deployment-id;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
